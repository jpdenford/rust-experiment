apiVersion: 1

datasources:
  - name: InfluxDB 3 Core
    type: influxdb
    access: proxy
    url: http://influxdb3-core:8181
    isDefault: true
    jsonData:
      version: InfluxQL
      dbName: sensor-experiment
      httpMode: POST
      # InfluxQL auth: user can be any non-empty value, token is used as password
      user: admin
    secureJsonData:
      password: apiv3_dev-local-token
