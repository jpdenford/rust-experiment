# compose.yaml
services:
  # Modified from the influxdb docs
  influxdb3-core:
    image: influxdb:3-core
    ports:
      - 8181:8181
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --wal-flush-interval=100ms # using local disks
      # Note: NOT PRODUCTION READY!
      # - --admin-token-file=/run/secrets/admin-token
      - --without-auth
    secrets:
      - admin-token # Having trouble with auth so just disable for now (solveable & not my main focus)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -H 'Authorization: Bearer apiv3_dev-local-token' http://localhost:8181/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - type: bind
        source: ~/.influxdb3/data
        target: /var/lib/influxdb3/data

  influxdb3-init:
    image: curlimages/curl:latest
    restart: "no"
    depends_on:
      influxdb3-core:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        curl -sf -X POST http://influxdb3-core:8181/api/v3/configure/database \
          -H 'Authorization: Bearer apiv3_dev-local-token' \
          -H 'Content-Type: application/json' \
          -d '{"db": "sensor-experiment"}' && echo 'Database sensor-experiment created.' && \
        curl -sf -X POST http://influxdb3-core:8181/api/v3/configure/table \
          -H 'Authorization: Bearer apiv3_dev-local-token' \
          -H 'Content-Type: application/json' \
          -d '{"db": "sensor-experiment", "table": "readings", "tags": ["sensor_id"], "fields": [{"name": "value", "type": "float64"}]}' && echo 'Table readings created.'

  grafana:
    image: grafana/grafana
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_FEATURE_TOGGLES_ENABLE=newInfluxDSConfigPageDesign
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      influxdb3-core:
        condition: service_healthy

secrets:
  admin-token:
    file: ./admin-token.json

volumes:
  grafana-storage:
